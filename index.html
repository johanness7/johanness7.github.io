<!DOCTYPE html>
<html lang="de">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3036128934622320" crossorigin="anonymous"></script>
    <link rel="icon" type="image/png" sizes="1280x1280" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>s7 hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f5f5f0; --card-bg: #ffffff; --text: #2c2c2e; --accent: #d4a373; --border: #e0e0d5; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Georgia', serif; margin: 0; padding: 0; display: flex; justify-content: center; min-height: 100vh; }
        .ad-sidebar { width: 160px; height: 600px; position: fixed; top: 100px; z-index: 50; }
        .ad-left { left: 20px; } .ad-right { right: 20px; }
        @media (max-width: 1250px) { .ad-sidebar { display: none; } }
        .main-content { width: 100%; max-width: 700px; padding: 60px 20px 250px 20px; display: flex; flex-direction: column; align-items: center; }
        .header img { height: 60px; margin: 0 0 40px 0; text-align: center; }
        .games-container { width: 100%; display: flex; flex-direction: column; gap: 20px; }
        .game-card { background: var(--card-bg); padding: 25px; border-radius: 2px; border: 1px solid var(--border); border-top: 4px solid var(--accent); box-shadow: 0 5px 15px rgba(0,0,0,0.02); text-decoration: none; color: var(--text); transition: transform 0.2s; }
        .game-card:hover { transform: scale(1.02); }
        .game-card h2 { margin: 0 0 10px 0; font-size: 1.5rem; font-weight: 400; }
        .game-card p { font-family: sans-serif; font-size: 14px; opacity: 0.7; margin: 0; }
        .footer-fixed { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg); padding: 10px 0 15px 0; display: flex; flex-direction: column; align-items: center; z-index: 1000; }
        .made-by { font-family: sans-serif; font-size: 12px; opacity: 0.6; margin-bottom: 8px; }
        .social-links { width: 100%; max-width: 550px; border-top: 1px solid var(--border); padding-top: 15px; display: flex; justify-content: center; gap: 30px; }
        .social-links a { color: var(--text); text-decoration: underline; font-family: sans-serif; font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .legal-links { font-size: 12px; opacity: 0.5; margin-top: 20px; font-family: sans-serif; text-align: center; }
        .legal-links a { color: inherit; text-decoration: none; }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="header"><img src="logo.png" alt="s7 hub logo"></div>
        <div class="games-container">
            <a href="https://johanness7.github.io/daspasswortspiel/" class="game-card">
                <h2>Das Passwort Spiel</h2>
                <p>Besiege das System und erstelle das perfekte Passwort.</p>
            </a>
            <a href="https://johanness7.github.io/reactiontest/" class="game-card">
                <h2>Reaktions-Test</h2>
                <p>Wie schnell sind deine Reflexe wirklich? Teste es hier.</p>
            </a>
            <a href="https://johanness7.github.io/theperfectcircle/" class="game-card">
                <h2>Der perfekte Kreis</h2>
                <p>Zeichne den perfekten Kreis um den Punkt. Schaffst du 100%?</p>
            </a>
        </div>
    </div>
    <div class="footer-fixed">
        <div class="made-by">made by johannes_s7</div>
        <div class="social-links">
            <a href="https://www.tiktok.com/@johannas.s7" target="_blank"><i class="fa-brands fa-tiktok"></i> TikTok</a>
            <a href="https://www.instagram.com/johannessiebecke" target="_blank"><i class="fa-brands fa-instagram"></i> Instagram</a>
        </div>
        <div class="legal-links"><a href="privacy.html">Datenschutz & Richtlinien</a></div>
    </div>
</body>
</html>
