    <title>Home Page</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #f5f5f0; 
            --card-bg: #ffffff;
            --text: #2c2c2e;
            --accent: #d4a373;
            --error: #e63946;
            --success: #2a9d8f;
            --border: #e0e0d5;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Georgia', serif;
            margin: 0; padding: 0;
            display: flex; justify-content: center;
            min-height: 100vh;
        }

        /* Werbe-Sidebar Styling - Exakt wie Passwort-Spiel */
        .ad-sidebar {
            width: 160px; 
            height: 600px;
            position: fixed; 
            top: 100px;
            z-index: 50;
        }
        .ad-left { left: 20px; }
        .ad-right { right: 20px; }

        @media (max-width: 1250px) { .ad-sidebar { display: none; } }

        .main-content {
            width: 100%; max-width: 700px;
            padding: 60px 20px 250px 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Header - Exakt wie im Passwort-Spiel Code */
        .header h1 { 
            font-size: 3.5rem; 
            font-weight: 400; 
            margin: 0 0 40px 0; 
            letter-spacing: -1px; 
            text-align: center; 
        }

        /* Spiele-Grid */
        .games-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .game-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 2px;
            border: 1px solid var(--border);
            border-top: 4px solid var(--accent);
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
            text-decoration: none;
            color: var(--text);
            transition: transform 0.2s;
        }

        .game-card:hover {
            transform: scale(1.02);
        }

        .game-card h2 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
            font-weight: 400;
        }

        .game-card p {
            font-family: sans-serif;
            font-size: 14px;
            opacity: 0.7;
            margin: 0;
        }

        /* Footer - Exakt wie im Passwort-Spiel Code */
        .footer-fixed {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--bg); padding: 10px 0 15px 0;
            display: flex; flex-direction: column; align-items: center; z-index: 1000;
        }
        .made-by { font-family: sans-serif; font-size: 12px; opacity: 0.6; margin-bottom: 8px; }
        .social-links { 
            width: 100%; max-width: 550px; 
            border-top: 1px solid var(--border); 
            padding-top: 15px; 
            display: flex; justify-content: center; gap: 30px; 
        }
        .social-links a { color: var(--text); text-decoration: underline; font-family: sans-serif; font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .legal-links { 
            font-size: 12px; 
            opacity: 0.5; 
            margin-top: 20px; 
            font-family: sans-serif; 
            text-align: center;
        }
        .legal-links a { color: inherit; text-decoration: none; }
    </style>
</head>
<body>

            </a>

        </div>
        <div class="legal-links">

</body>
</html>
